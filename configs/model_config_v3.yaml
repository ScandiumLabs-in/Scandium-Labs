model:
  name: "ScandiumPINNGNN-v3-upgraded"
  hidden_dim: 200
  num_alignn_layers: 3
  num_transformer_layers: 2
  num_attention_heads: 4
  dropout: 0.1
  mc_dropout_samples: 20
  use_pretrained_alignn: false

graph:
  cutoff: 8.0
  max_neighbors: 16
  rbf_type: "bessel"
  num_rbf: 64
  num_sbf: 32

tasks:
  - name: "log_ionic_conductivity"
    scale: "log10"
    weight: 1.0
    unit: "log(S/cm)"
  - name: "formation_energy"
    scale: "linear"
    weight: 1.0
    unit: "eV/atom"
  - name: "energy_above_hull"
    scale: "linear"
    weight: 0.8
    unit: "eV/atom"
  - name: "activation_energy"
    scale: "linear"
    weight: 0.6
    unit: "eV"
  - name: "band_gap"
    scale: "linear"
    weight: 0.4
    unit: "eV"

pinn:
  lambda_data: 1.0
  lambda_physics: 0.1
  lambda_arrhenius: 0.05
  lambda_thermodynamic: 0.05

training:
  batch_size: 4
  learning_rate: 0.001
  warmup_steps: 1000
  max_epochs: 100
  patience: 30
  scheduler: "cosine_with_restarts"
  optimizer: "AdamW"
  weight_decay: 0.00001
  gradient_clip: 1.0
  mixed_precision: true

log_eah: true
log_eah_eps: 0.001
