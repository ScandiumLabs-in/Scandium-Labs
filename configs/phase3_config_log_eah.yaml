graph:
  cutoff: 8.0
  max_neighbors: 16
  num_rbf: 64
  num_sbf: 32
  rbf_type: bessel
log_eah: true
log_eah_eps: 0.001
model:
  dropout: 0.1
  hidden_dim: 128
  name: ScandiumPINNGNN-v2-log-eah
  num_alignn_layers: 2
  num_attention_heads: 4
  num_transformer_layers: 1
  use_pretrained_alignn: false
tasks:
- name: formation_energy
  weight: 1.0
- name: energy_above_hull
  weight: 0.8
- name: band_gap
  weight: 0.4
training:
  batch_size: 8
  gradient_clip: 1.0
  learning_rate: 0.001
  max_epochs: 200
  mixed_precision: true
  optimizer: AdamW
  patience: 50
  scheduler: cosine_with_restarts
  warmup_steps: 1000
  weight_decay: 1.0e-05
