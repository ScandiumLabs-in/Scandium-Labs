version: "3.9"

x-db-common: &db-common
  POSTGRES_DB: scandium
  POSTGRES_USER: ${POSTGRES_USER:-scandium}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}

x-api-common: &api-common
  DATABASE_URL: postgresql://${POSTGRES_USER:-scandium}:${POSTGRES_PASSWORD:?}@postgres:5432/scandium
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}
  SCANDIUM_ENV: ${SCANDIUM_ENV:-production}

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      <<: *api-common
      MODEL_PATH: /models/best_model.pt
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./models:/models
    deploy:
      replicas: 2

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      <<: *api-common
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    deploy:
      replicas: 4
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  inference:
    image: pytorch/torchserve:latest-gpu
    profiles:
      - torchserve
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./model_store:/home/model-server/model-store
    command: >
      torchserve --start
      --model-store /home/model-server/model-store
      --models scandium=scandium_pinn_gnn.mar
      --ts-config /home/model-server/config.properties

  postgres:
    image: postgres:16-alpine
    environment:
      <<: *db-common
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scandium} -d scandium"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru

  flower:
    image: mher/flower
    profiles:
      - flower
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_UNAUTHENTICATED_API: "false"
      FLOWER_BASIC_AUTH: ${FLOWER_USER:-admin}:${FLOWER_PASSWORD:?FLOWER_PASSWORD must be set}
    depends_on:
      - redis

volumes:
  pgdata:
